# CPEX runtime config for the HR demo — CEL variant.
#
# Identical to cpex.yaml EXCEPT the PDP backend for the search_repos
# route: this config uses CEL (Common Expression Language) instead of
# Cedar. Both express the same decision ("engineers read internal repos;
# security reads any") — see cpex.yaml for the Cedar form. Run this
# variant with:  GATEWAY_CONFIG=praxis-cel.yaml ./restart.sh
#
# Hot path:
#   1. jwt-user      validates X-User-Token against Keycloak (cpex-demo realm)
#                    → security.subject + raw_credentials.inbound_tokens[User]
#   2. jwt-client    validates Authorization against Keycloak (same realm)
#                    → security.client
#   3. APL gate      require(role.hr) on the get_compensation tool
#   4. APL delegate  workday-oauth exchanges the user's IdP token for an
#                    audience=workday-api token via Keycloak (RFC 8693)
#   5. APL args      ssn arg gets redacted unless caller has perm.view_ssn
#
# Keycloak runs locally at http://localhost:8081. JWTs are RS256-signed
# by the realm's automatically-generated signing key. We point at the
# realm's JWKS URL so the resolver fetches the active public key at
# init time (no manual PEM paste).

plugin_settings:
  routing_enabled: true

plugins:
  # User identity. Carries the human's roles + permissions claims.
  - name: jwt-user
    kind: identity/jwt
    hooks: [identity.resolve]
    mode: sequential
    priority: 10
    on_error: fail
    config:
      role: user
      header: X-User-Token
      trusted_issuers:
        - issuer: "http://localhost:8081/realms/cpex-demo"
          audiences: ["praxis-gateway"]
          algorithms: ["RS256"]
          decoding_key:
            kind: jwks_url
            url: "http://localhost:8081/realms/cpex-demo/protocol/openid-connect/certs"
            insecure_http: true   # localhost dev — never production
          leeway_seconds: 60
      claim_mapper: standard

  # Client identity. Carries the agent's client_id / azp.
  - name: jwt-client
    kind: identity/jwt
    hooks: [identity.resolve]
    mode: sequential
    priority: 20
    on_error: fail
    config:
      role: client
      header: Authorization
      trusted_issuers:
        - issuer: "http://localhost:8081/realms/cpex-demo"
          audiences: ["praxis-gateway", "account"]
          algorithms: ["RS256"]
          decoding_key:
            kind: jwks_url
            url: "http://localhost:8081/realms/cpex-demo/protocol/openid-connect/certs"
            insecure_http: true   # localhost dev — never production
          leeway_seconds: 60
      claim_mapper: standard

  # RFC 8693 token-exchange delegator. Trades the user's hr-copilot
  # token for a workday-api-audience-scoped access token.
  #
  # Pattern 1 (workday flow): the user already carries view_ssn etc.
  # as a Keycloak user attribute → claim. The exchange just changes
  # the audience; the perms come along for the ride.
  - name: workday-oauth
    kind: delegator/oauth
    hooks: [token.delegate]
    mode: sequential
    priority: 30
    on_error: fail
    capabilities:
      - read_inbound_credentials
      - write_delegated_tokens
    config:
      token_endpoint: "http://localhost:8081/realms/cpex-demo/protocol/openid-connect/token"
      insecure_http: true   # localhost dev — never production
      client_id: "praxis-gateway"
      # Secret source. `kind: literal` is an inline secret (dev only).
      # Other kinds: `kind: env_var` with `name:` (read from the
      # environment at startup) and `kind: file` with `path:` (read from
      # a file). Prefer env_var or file in production; do not commit
      # secrets to YAML.
      client_secret_source:
        kind: literal
        secret: "praxis-gateway-secret"
      timeout_seconds: 5
      default_outbound_header: "Authorization"

  # ----------------------------------------------------------------
  # Field-level validator: PII scanner.
  # ----------------------------------------------------------------
  # Walks tool/prompt arguments looking for SSN / credit-card / email
  # patterns. If found in `deny` mode, refuses the request. Wired on
  # `cmf.tool_pre_invoke` so it fires before every tool call.
  - name: pii-scan
    kind: validator/pii-scan
    hooks: [cmf.tool_pre_invoke]
    mode: sequential
    priority: 25
    on_error: fail
    config:
      detect:
        - { kind: ssn }
        - { kind: credit_card }
      mode: deny

  # ----------------------------------------------------------------
  # Observation: structured audit logger.
  # ----------------------------------------------------------------
  # Emits one JSON line per dispatched request capturing subject,
  # client, entity, tool args, and any delegation outcomes. Never
  # blocks — observation only. Wired on every CMF entity hook so
  # the audit trail covers all tool / prompt / resource traffic.
  - name: audit-log
    kind: audit/logger
    hooks:
      - cmf.tool_pre_invoke
      - cmf.prompt_pre_invoke
      - cmf.resource_pre_fetch
    mode: sequential
    priority: 90    # fires AFTER policy / delegate so the record
                    # reflects the final decision + minted tokens
    on_error: ignore  # observation failures don't halt traffic
    capabilities:
      - read_subject
      - read_client
      - read_meta
      - read_delegated_tokens
    config:
      destination: stderr
      source: cpex-demo-gateway

  # Second delegator — same plugin kind, different audience.
  #
  # Pattern 3 (github flow): the user's inbound token does NOT
  # carry github perms. The github-api client in Keycloak has a
  # per-audience claim mapper (`gh-permissions-as-scope`) that
  # injects `gh_permissions` from the user attribute as the
  # minted token's `permissions` claim. The IdP is the source of
  # system-specific perm truth; the gateway just asks.
  - name: github-oauth
    kind: delegator/oauth
    hooks: [token.delegate]
    mode: sequential
    priority: 31
    on_error: fail
    capabilities:
      - read_inbound_credentials
      - write_delegated_tokens
    config:
      token_endpoint: "http://localhost:8081/realms/cpex-demo/protocol/openid-connect/token"
      insecure_http: true   # localhost dev — never production
      client_id: "praxis-gateway"
      # Secret source. `kind: literal` is an inline secret (dev only).
      # Other kinds: `kind: env_var` with `name:` (read from the
      # environment at startup) and `kind: file` with `path:` (read from
      # a file). Prefer env_var or file in production; do not commit
      # secrets to YAML.
      client_secret_source:
        kind: literal
        secret: "praxis-gateway-secret"
      timeout_seconds: 5
      default_outbound_header: "Authorization"

global:
  identity:
    - jwt-user
    - jwt-client

  # ----------------------------------------------------------------
  # CEL PDP — inline boolean predicates as the decision backend.
  # APL routes call into CEL via `cel:` steps; the expression
  # evaluates against the common attribute vocabulary (subject.*,
  # role.*, args.*, delegation.*, session.*) and returns a boolean:
  # true → allow, false (or any eval error) → fail-closed deny.
  #
  # CEL vs Cedar (see cpex.yaml for the Cedar form): reach for CEL
  # when the decision is a self-contained boolean predicate authored
  # inline in the route — no external policy store, zero glue. Reach
  # for Cedar when policy lives outside the route (versioned/signed
  # policy sets) or needs the full entity/relationship model. Here
  # both express the SAME decision so the two are directly comparable.
  #
  # NOTE: this config omits the `apl:` wrapper — APL terms (`pdp:` here,
  # `policy:`/`args:`/`result:` on the routes below) sit directly on the
  # section. cpex accepts both forms; see cpex.yaml for the wrapped style.
  # ----------------------------------------------------------------
  pdp:
    - kind: cel
      on_error: deny   # fail-closed; the default, spelled out

routes:
  # ----------------------------------------------------------------
  # WORKDAY FLOW — Pattern 1 (centralized IdP knows all perms).
  # User token carries view_ssn directly; APL gates on a flat
  # role/perm predicate + redacts ssn on the wire if missing.
  # ----------------------------------------------------------------
  - tool: get_compensation
    policy:
      - "require(role.hr)"
      - "delegate(workday-oauth, target: workday-api, audience: workday-api, permissions: [read_compensation])"
      # Taint the session: reading compensation marks this session as
      # having touched secret data. The label persists in the CPEX
      # session store (keyed by H(subject : X-Session-Id)) and is
      # checked later by send_email — a cross-tool, cross-request
      # data-flow control. See scenarios 08 / 09.
      - "taint(secret, session)"
      # Emit a structured audit record AFTER the policy + delegate
      # decisions are in. Records who called what, with which scope.
      - "run(audit-log)"
    args:
      # `redact(!perm.view_ssn)` fires when the caller LACKS the
      # permission. The arg key remains, value becomes "[REDACTED]" —
      # downstream tool can see "ssn was here but you can't read it."
      ssn: "str | redact(!perm.view_ssn)"
    result:
      # Symmetric guard on the response side. The tool may include
      # the SSN in its result (it does, when include_ssn=true);
      # without this rule, a caller with role.hr but NOT
      # perm.view_ssn (e.g. eve) would receive it. Redacting on the
      # response closes the loop — the LLM-driven flow doesn't even
      # require the caller to mention `ssn` in args for the guard
      # to fire, because the SSN comes back unsolicited in the
      # upstream tool's response.
      ssn: "str | redact(!perm.view_ssn)"

  # ----------------------------------------------------------------
  # GITHUB FLOW — Pattern 3 (IdP per-audience mapping + CEL PDP).
  #
  # Four authorization layers in one route:
  #
  #   1. APL gate     — cheap predicate. Short-circuits requests
  #                     from users who can't ever read repos.
  #   2. CEL PDP      — inline boolean over subject roles and the
  #                     requested repo's visibility. The CEL form of
  #                     the Cedar relationship rule in cpex.yaml.
  #   3. Delegation   — RFC 8693 to github-api audience. Keycloak's
  #                     per-audience mapper injects gh_permissions
  #                     into the `permissions` claim.
  #   4. Post-check   — verify the IdP actually granted enough.
  #                     If the IdP narrowed the scope, refuse to
  #                     forward — the token never reaches GitHub.
  # ----------------------------------------------------------------
  - tool: search_repos
    policy:
      # Layer 1 — coarse APL gate on group membership.
      - "require(team.engineering | team.security)"

      # Layer 2 — CEL fine-grained authorization. `subject.roles`
      # is the principal's role list; `args.visibility` is the
      # requested repo's visibility (lifted from the tool args).
      # Engineers may read internal repos; security may read any.
      - cel:
          expr: |
            (has(role.engineer) && role.engineer && args.visibility == "internal")
            || (has(role.security) && role.security)
          # on_deny reactions run when the expression is false. Without
          # this block the PDP still fail-closes (violation `cel`), just
          # like the Cedar step's `cedar.default_deny`; here we attach a
          # clearer reason so the client sees WHY. NOTE the quoting: the
          # whole reaction is a double-quoted YAML scalar (so the `;` and
          # spaces stay in one string) and the reason is single-quoted
          # per the APL DSL — `deny('reason')` / `deny('reason', 'code')`.
          on_deny:
            - "deny('engineering may read internal repos only; security may read any', 'cel.policy_denied')"

      # Layer 3 — Token exchange. Keycloak's github-api mapper
      # injects the user's gh_permissions as the `permissions`
      # claim on the minted token.
      - "delegate(github-oauth, target: github-api, audience: github-api, permissions: [repo:read:internal])"

      # Layer 4 — Verify the IdP granted enough. If the user's
      # gh_permissions attribute didn't include repo:read:internal,
      # the minted token comes back narrower than asked. Deny here
      # rather than forwarding an insufficient token.
      - "!(delegation.granted.permissions contains 'repo:read:internal'): deny"

      # Audit every github call.
      - "run(audit-log)"

  # ----------------------------------------------------------------
  # SEND_EMAIL — PII scanner gate.
  #
  # The interesting flow: when the LLM composes an email body, it
  # might include raw PII pulled from earlier tool responses ("Bob's
  # SSN is 555-12-3456"). The PII scanner catches that before the
  # email goes out. Operators see the deny in real time on stderr
  # via the audit logger.
  # ----------------------------------------------------------------
  - tool: send_email
    policy:
      - "require(perm.email_send)"
      # audit-log is ordered BEFORE pii-scan deliberately. A policy
      # step that denies short-circuits the chain, so any step after
      # the deny never runs. Placing the observation first guarantees
      # the attempt is recorded even though the very next step is
      # about to block it — a denied data-exfiltration attempt is
      # precisely what a security audit trail must capture. audit-log
      # is observation-only (it cannot allow or deny), so running it
      # first never changes the verdict; the emitted record carries
      # the offending args, including the SSN-bearing body.
      - "run(audit-log)"
      # Walks args.body / args.subject / args.to and denies if any
      # carries an SSN-like or credit-card-like pattern.
      - "run(pii-scan)"
      # Session-taint gate: block email from a session that previously
      # accessed secret data (get_compensation runs taint(secret,
      # session)). Distinct from pii-scan above — that catches PII in
      # the body; this denies even a CLEAN body because the *session*
      # is tainted. The label is read from `security.labels`, hydrated
      # from the session store on this request. See scenarios 08 / 09.
      - "security.labels contains \"secret\": deny('external email blocked: this session accessed secret data', 'session_tainted_secret')"
